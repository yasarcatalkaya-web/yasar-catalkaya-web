name: Update mevzuat data

on:
  schedule:
    # Her gün 06:00 İstanbul (UTC+3 = 03:00 UTC)
    - cron: '0 3 * * *'
  workflow_dispatch: {}
  push:
    paths:
      - 'scripts/fetch-mevzuat.mjs'
      - '.github/workflows/update-mevzuat.yml'

permissions:
  contents: write

concurrency:
  group: update-mevzuat
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch mevzuat from GİB
        run: node scripts/fetch-mevzuat.mjs

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/mevzuat.json
          if git diff --cached --quiet; then
            echo "::notice::No mevzuat changes."
            exit 0
          fi
          git commit -m "chore(mevzuat): GİB duyurularını güncelle"
          # Concurrent run yarışı varsa rebase ile çöz
          for i in 1 2 3; do
            if git push; then exit 0; fi
            echo "::warning::push failed (try $i), rebasing onto origin/main…"
            git pull --rebase origin main
          done
          echo "::error::push still failing after retries"
          exit 1
